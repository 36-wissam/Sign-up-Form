<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="src/favicon.png">
    <script src="script.js" defer></script>
    <title>Sign Up Form</title>
</head>
<body>
    <div class="signup-container">
        

        <div class="left-section">
            
            <h1>Sign Up</h1>
            <form id="signup-form">
                <fieldset>
                    <legend>Personal Information</legend>
                    <label for="first-name">First Name:</label>
                    <input type="text" id="first-name" name="first-name" placeholder="Enter your first name" minlength="3" maxlength="20" required>
                    <div class="error-message" id="first-name-error"></div>

                     <label for="last-name">Last Name:</label>
                    <input type="text" id="last-name" name="last-name" placeholder="Enter your last name" minlength="3" maxlength="20" required>
                    <div class="error-message" id="last-name-error"></div>

                    <div class="sex">
                        <label for="male">Male</label>
                        <input type="radio" id="male" name="sex" value="male">
                        <label for="female">Female</label>
                        <input type="radio" id="female" name="sex" value="female">
                    </div>

                  <label for="email">Email:</label>
                   <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    <div class="error-message" id="email-error"></div>

                      <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" minlength="6" maxlength="20" required>
                <div class="error-message" id="password-error"></div>
                <div class="checkbox-terms">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to the <a href="https://www.youtube.com/watch?v=E4aOX_1nDHA" target="_blank" rel="noopener noreferrer">Terms and Conditions</a></label>
                </div>
             </fieldset>

             <fieldset id="address-fieldset">
                
                <legend>Address Information</legend>
                <label for="address">Address:</label>
                <input type="text" id="address" name="address" placeholder="Enter your address" required>
                <div class="error-message" id="address-error"></div>

                <label for="city">City:</label>
                <select name="City" id="city" required>
                    <option value="">Select a city</option>
                    <option value="Sulaymaniyah">Sulaymaniyah</option>
                    <option value="Anbar">Anbar</option>
                    <option value="Baghdad">Baghdad</option>
                </select>

                <label for="state">State:</label>
                <input type="text" id="state" name="state" placeholder="Enter your state" required>
                <div class="error-message" id="state-error"></div>

                <label for="zip">Zip Code:</label>
                <input type="text" id="zip" name="zip" placeholder="Enter your zip code" pattern="\d{5}" required>
                <div class="error-message" id="zip-error"></div>    
             </fieldset>
            <div class="btnss">
                <button id="signUpBtn" type="submit">Sign Up</button>
                <div class="switch-container">
                    <button type="button" id="switchButton">Dark</button>
                </div>
            </div>

            <div  class="login-link">
                <p>Already have account? <a href="https://youtu.be/ku5k9a3xBiY?si=7up372gOZHDeGJxk" target="_blank" rel="noopener noreferrer">Login</a></p>

            </div>
        </form>
        </div>
        <div class="right-section">
            <div class="image">
                <img src="src/login-img.png" alt="Sign Up Image" height="100%" width="100%">
            </div>
        </div>
        
        
    </div>

    <footer>
        <p>&copy; 2026 Wissam. All rights reserved.</p>
    </footer>


</body>
</html>
